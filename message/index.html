<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMS Sender</title>

<style>
body{
margin:0;
padding:20px;
font-family:Arial;
background:#f2f2f2;
}
.box{
max-width:420px;
margin:auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
text-align:center;
}
input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}
textarea{
height:140px;
resize:none;
}
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#28a745;
color:#fff;
font-size:18px;
}
#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>

</head>
<body>

<div class="box">

<h2>SMS Sender</h2>

<input
id="phone"
placeholder="+639123456789">

<textarea
id="message"
placeholder="Type message..."></textarea>

<button onclick="sendSMS()">
SEND SMS
</button>

<div id="status"></div>

</div>

<script>

async function sendSMS(){

const to=document.getElementById("phone").value.trim();
const message=document.getElementById("message").value.trim();

document.getElementById("status").innerHTML="Sending...";

try{

const res=await fetch("http://10.173.181.204:8082/",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

to:to,

message:message

})

});

const txt=await res.text();

document.getElementById("status").innerHTML=
"Response : "+txt;

}catch(err){

document.getElementById("status").innerHTML=
"❌ "+err.message;

}

}

</script>

</body>
</html>
