<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Sender</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
.container{
    max-width:400px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
}
input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}
textarea{
    height:120px;
    resize:none;
}
button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#28a745;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
button:active{
    transform:scale(.98);
}
#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>SMS Sender</h2>

<input type="text" id="phone" placeholder="09XXXXXXXXX">

<textarea id="message" placeholder="Type your message..."></textarea>

<button onclick="sendSMS()">SEND SMS</button>

<div id="status"></div>

</div>

<script>

async function sendSMS(){

const phone=document.getElementById("phone").value.trim();
const message=document.getElementById("message").value.trim();

document.getElementById("status").innerHTML="Sending...";

try{

const response=await fetch("http://10.173.181.204:8080/send-sms",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
message:message
})
});

if(response.ok){
document.getElementById("status").innerHTML="✅ SMS Sent!";
}else{
document.getElementById("status").innerHTML="❌ Failed!";
}

}catch(e){
document.getElementById("status").innerHTML="❌ "+e.message;
}

}

</script>

</body>
</html>
