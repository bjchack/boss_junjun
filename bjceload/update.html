<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update BJC Eload</title>
  <style>
    body { 
      background:#111; 
      color:white; 
      font-family:sans-serif; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      justify-content:center; 
      height:100vh; 
      text-align:center;
    }
    button { 
      padding:12px 20px; 
      font-size:16px; 
      border:none; 
      border-radius:6px; 
      background:#ff9800; 
      color:black; 
      cursor:pointer; 
      margin-top:20px; 
    }
    button:disabled {
      background:#888; 
      cursor:not-allowed;
    }
  </style>
</head>
<body>
  <h2>May bagong update sa BJC Eload!</h2>
  <p>Version: <span id="version"></span></p>
  <p id="notes"></p>
  <button id="downloadBtn">Download & Install</button>

  <script>
    fetch('version.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('version').innerText = data.version;
        document.getElementById('notes').innerText = data.notes;

        const btn = document.getElementById('downloadBtn');
        btn.onclick = () => {
          // Disable button agad para hindi ma-double click
          btn.disabled = true;
          btn.innerText = "Downloading...";

          // Redirect sa APK
          window.location.href = data.apk;

          // Optional: ibalik ang button after 10 seconds kung may problema
          setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "Download & Install";
          }, 10000); 
        }
      })
      .catch(err => console.log('Error loading version.json', err));
  </script>
</body>
</html>
