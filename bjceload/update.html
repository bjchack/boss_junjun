<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update BJC Eload</title>
  <style>
    body { background:#111; color:white; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
    button { padding:12px 20px; font-size:16px; border:none; border-radius:6px; background:#ff9800; color:black; cursor:pointer; margin-top:20px; }
    p { text-align:center; max-width:300px; }
    #downloadBtn:disabled { background:#555; cursor:not-allowed; }
  </style>
</head>
<body>
  <h2>May bagong update sa BJC Eload!</h2>
  <p>Version: <span id="version"></span></p>
  <p id="notes"></p>
  <button id="downloadBtn">Download & Install</button>
  <p id="instructions"></p>

  <script>
    const downloadBtn = document.getElementById('downloadBtn');
    const instructions = document.getElementById('instructions');

    fetch('https://www.bjcprogramming.store/bjceload/version.json')
    .then(res => res.json())
    .then(data => {
      document.getElementById('version').innerText = data.version;
      document.getElementById('notes').innerText = data.notes;

      downloadBtn.onclick = () => {
        // Disable button para hindi ma-double click
        downloadBtn.disabled = true;
        downloadBtn.innerText = "Downloading...";
        
        // Redirect sa APK (browser will download)
        window.location.href = data.apk;

        // Show instruction para sa user
        instructions.innerText = "After download, tap the APK in your Downloads folder to install/update the app.";
      }
    })
    .catch(err => console.log('Error loading version.json', err));
  </script>
</body>
</html>
