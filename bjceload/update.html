<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update BJC Eload</title>
<style>
  body { background:#111; color:white; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
  button { padding:12px 20px; font-size:16px; border:none; border-radius:6px; background:#ff9800; color:black; cursor:pointer; margin-top:20px; }
  p { text-align:center; max-width:300px; }
  #downloadBtn:disabled { background:#555; cursor:not-allowed; }
</style>
</head>
<body>
  <h2>May bagong update sa BJC Eload!</h2>
  <p>Version: <span id="version"></span></p>
  <p id="notes"></p>
  <button id="downloadBtn">Download & Install</button>
  <p id="instructions"></p>

  <script>
    const downloadBtn = document.getElementById('downloadBtn');
    const instructions = document.getElementById('instructions');

    fetch('https://www.bjcprogramming.store/bjceload/version.json?t=' + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      const latestVersion = data.version;
      document.getElementById('version').innerText = latestVersion;
      document.getElementById('notes').innerText = data.notes;

      // Palaging ipakita yung button kahit may version
      downloadBtn.style.display = 'inline-block';

      // Button click handler
      downloadBtn.onclick = () => {
        downloadBtn.disabled = true;
        downloadBtn.innerText = "Downloading...";
        instructions.innerText = "Please wait... If download doesn't start, tap again in Downloads folder.";

        // Redirect sa APK
        window.location.href = data.apk;
      }
    })
    .catch(err => {
      console.log('Error loading version.json', err);
      instructions.innerText = "Error fetching update info. Try again later.";
    });
  </script>
</body>
</html>
