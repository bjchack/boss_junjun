<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnliData Connection</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
}

.card{
    max-width:400px;
    margin:60px auto;
    background:rgba(0,0,0,0.4);
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
    color:#00ffcc;
    font-size:22px;
}

.details{
    margin-top:15px;
    line-height:1.6;
    font-size:15px;
}

#countdown{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#ffd700;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    margin-top:20px;
}

.expired{
    background:red;
    color:white;
    display:none;
}

.message{
    background:#00ffcc;
    color:black;
}

.footer{
    margin-top:30px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="card">

<h1>🎉 Congratulations Maam Monyheng</h1>

<div class="details">
You are connected to <b>UNLIDATA</b><br>
Start Date: February 25, 2026<br>
Time: 12:20 AM<br>
Validity: 30 Days
</div>

<div id="countdown"></div>

<button class="expired" id="expireBtn">EXPIRED</button>

<br>

<a href="https://m.me/bossjunjun09" target="_blank">
<button class="message">Message Boss Junjun</button>
</a>

<div class="footer">
© 2026 BJC TEAM - All Rights Reserved
</div>

</div>

<script>

// ===== START DATE =====
let startDate = new Date("2026-02-25T00:20:00").getTime();

// ===== ADD 30 DAYS =====
let expireDate = startDate + (30 * 24 * 60 * 60 * 1000);

let timer = setInterval(function(){

    let now = new Date().getTime();
    let distance = expireDate - now;

    if(distance <= 0){
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "⚠ CONNECTION EXPIRED";
        document.getElementById("expireBtn").style.display = "inline-block";
        return;
    }

    let days = Math.floor(distance / (1000*60*60*24));
    let hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    let minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    let seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
    "Remaining: " + days + "d " + hours + "h "
    + minutes + "m " + seconds + "s ";

},1000);

</script>

</body>
</html>
